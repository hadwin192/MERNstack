<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
        background-image: url('images/bground.png');
        }
    </style>
</head>
<body>

    <table width="100%" cellpadding="10" style="background-color: rgb(86, 124, 124);">
        <tr>
        <td align="center"><font color="white" size="5"><b>PixelArt Gallery</b></font></td>
        </tr>
    </table>

    <br><br><br>

    <table align="center" border="1" cellpadding="20" width="350" style="background-color: rgb(72, 114, 100);">
        <tr>
        <td align="center">
            <h2>Login</h2>
            <form action="gallery_home.html">
                <p align="left">
                    Email Address:<br>
                    <input type="email" name="email" required size="30">
                </p>
                <p align="left">
                    Password:<br>
                    <input type="password" name="password" required size="30">
                </p>
                <input type="submit" value="Sign In" style="width: 100%; height: 30px;">
            </form>
            <br>
            <p><a href="signup.html">Sign Up</a> If you don't have an account</p>
        </td>
        </tr>
    </table>

</body>
</html>
