<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <style>
        body {
        background-image: url('images/bground.png');
        }
    </style>
</head>
<body>

    <table width="100%" bgcolor="#333333" cellpadding="10">
        <tr>
            <td><font color="white" size="5"><b>PixelArt Gallery</b></font></td>
        </tr>
    </table>

    <br><br><br>

    <table align="center" border="1" cellpadding="20" width="350" style="background-color: rgb(101, 131, 158);">
        <tr>
            <td align="center">
                <h2>Create Account</h2>
                <form action="gallery_home.html">
                    <p align="left">
                        Full Name:<br>
                        <input type="text" name="name" required size="30">
                    </p>
                    <p align="left">
                        Email Address:<br>
                        <input type="email" name="email" required size="30">
                    </p>
                    <p align="left">
                        Password:<br>
                        <input type="password" name="password" required size="30">
                    </p>
                    <input type="submit" value="Register" style="width: 100%; height: 30px;">
                </form>
                <br>
                <p>Already registered? <a href="login.html">Login</a></p>
            </td>
        </tr>
    </table>

</body>
</html>
